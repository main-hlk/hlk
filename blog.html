        </div>

          <p>Önümüzdeki hafta bir turnuva düzenlenecek. Katılmak için profilinizden kayıt olabilirsiniz.</p>
        </div>
        <!-- Diğer blog gönderileri buraya eklenebilir -->
      `;
    }
  </script>
