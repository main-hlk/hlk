<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HLK Kulübü - Turnuva</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Turnuva</h1>
    <nav>
      <a href="index.html">Ana Sayfa</a>
      <a href="blog.html">Blog</a>
      <a href="shop.html">Alışveriş</a>
      <a href="contact.html">İletişim</a>
      <a href="profile.html">Profil</a>
      <a href="turnuva.html">Turnuva</a>
    </nav>
    <div id="turnuvaContent">
      <h2>Turnuvaya Katıl</h2>
      <p>Online kullanıcılarla birlikte 10 kişilik takımlar oluşturun ve turnuvaya katılın!</p>
      <button onclick="joinTournament()" id="joinButton">Turnuvaya Katıl</button>
      <div id="onlineUsersSection" style="display: none;">
        <h3>Online Kullanıcılar</h3>
        <ul id="onlineUsersList"></ul>
      </div>
    </div>
  </div>
  <script>
    const apiUrl = "http://localhost:3000"; // Backend API URL'si

    // Kullanıcıyı online listesine ekle
    async function joinTournament() {
      const currentUser = JSON.parse(localStorage.getItem("currentUser"));
      if (!currentUser) {
        alert("Lütfen önce giriş yapın!");
        window.location.href = "login.html";
        return;
      }

      const response = await fetch(`${apiUrl}/join`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: currentUser.name }),
      });
      const data = await response.json();

      // Online kullanıcıları göster
      document.getElementById("onlineUsersSection").style.display = "block";
      document.getElementById("joinButton").style.display = "none";
      showOnlineUsers(data.onlineUsers);
    }

    // Online kullanıcıları göster
    function showOnlineUsers(users) {
      const onlineUsersList = document.getElementById("onlineUsersList");
      onlineUsersList.innerHTML = users.map(user => `<li>${user}</li>`).join("");
    }

    // Sayfadan ayrılırken kullanıcıyı online listesinden çıkar
    window.onbeforeunload = async function () {
      const currentUser = JSON.parse(localStorage.getItem("currentUser"));
      if (currentUser) {
        await fetch(`${apiUrl}/leave`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: currentUser.name }),
        });
      }
    };

    // Sayfa yüklendiğinde online kullanıcıları al
    window.onload = async function () {
      const response = await fetch(`${apiUrl}/online-users`);
      const data = await response.json();
      showOnlineUsers(data.onlineUsers);
    };
  </script>
</body>
</html>
